logging:
  config: classpath:log/logback-spring.xml

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:yuyu;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:

workflow:
  security:
    issuer: http://127.0.0.1:8080
    token-expire-seconds: 7200
    client-id: workflow-client
    client-secret: workflow-client-secret
    client-name: Workflow Client
    client-redirect-uri: http://127.0.0.1:8080/swagger-ui/oauth2-redirect.html
